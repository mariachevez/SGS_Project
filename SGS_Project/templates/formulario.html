<form method="post" id="formModal" action="{{ guardar }}" class="px-3 py-2">
  {% csrf_token %}

  <div class="row g-2">
    {% for field in form %}
    <div
      class="fieldset_{{field.name}} col-md-{{ field.field.col|default:'12' }}"
    >
      <label
        for="{{ field.id_for_label }}"
        class="form-label small fw-semibold text-dark ls-tight mb-1.5"
      >
        {{ field.label }}
      </label>

      <div
        class="modern-input-wrapper {% if field.errors %}is-invalid-field{% endif %}"
      >
        {{ field }}
      </div>

      {% if field.help_text %}
      <div
        class="form-text text-muted fs-7 mt-1.5 ps-1 d-flex align-items-center gap-1.5 opacity-75"
      >
        <i class="fa-solid fa-circle-info text-secondary opacity-50"></i>
        <span>{{ field.help_text|safe }}</span>
      </div>
      {% endif %} {% if field.errors %}
      <div
        class="text-danger small mt-2 d-flex align-items-center gap-1.5 fw-medium opacity-90 ps-1 layout-error"
      >
        <i class="fa-solid fa-triangle-exclamation fs-7.5"></i>
        <span>{{ field.errors|striptags }}</span>
      </div>
      {% endif %}
    </div>
    {% endfor %}
  </div>
</form>
{% block extra_js %} {% endblock %}
