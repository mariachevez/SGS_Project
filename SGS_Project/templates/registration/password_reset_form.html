<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/registration/login.css' %}">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-12 col-sm-10 col-md-6 col-lg-4">
                <div class="form-container">
                    <p class="title">¿La olvidaste?</p>
                    <p class="text-description">Introduce tu dirección de correo electrónico y te enviaremos instrucciones para crear una nueva.</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="custom-input-group mb-4">
                            <label for="id_email">Correo Electrónico</label>
                            <input type="email" name="email" id="id_email" placeholder="tu_correo@ejemplo.com" required autocomplete="off">
                            {% if form.email.errors %}
                                {% for error in form.email.errors %}
                                    <span class="error-text">{{ error }}</span>
                                {% endfor %}
                            {% endif %}
                        </div>
                        <button type="submit" class="sign w-100">Enviar enlace</button>
                        <div class="custom-hr"></div>
                        <a href="{% url 'login' %}" class="btn-secondary-custom">Volver al login</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
