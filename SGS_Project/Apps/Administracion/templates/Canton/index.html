{% extends 'nav.html' %} {% block btn_add %}
<a
  onclick='formModal("{% url "crear_canton" %}", "Adicionar Cantón")'
  class="btn btn-success btn-sm d-flex align-items-center gap-2 px-3 py-2 rounded-2 fs-7 shadow-sm"
  ><i class="fa-solid fa-plus fs-7"></i
  ><span class="fw-medium">Adicionar</span></a
>
{% endblock %} {% block block_thead %}
<tr>
  <th class="fs-7">#</th>
  <th class="fs-7">Cantón</th>
  <th class="fs-7">Provincia</th>
  <th class="fs-7">Acciones</th>
</tr>
{% endblock %} {% block block_tbody %} {% for canton in cantones %}
<tr>
  <td class="fs-7">{{ forloop.counter }}</td>
  <td class="fs-7">{{ canton.nombre }}</td>
  <td class="fs-7">{{ canton.provincia.nombre }}</td>
  <td class="fs-7">
    <div class="d-flex justify-content-center align-items-center gap-1">
      <a onclick='formModal("{% url "editar_canton" canton.pk %}", "Editar un Cantón")' 
        data-bs-toggle="tooltip" 
        href="javascript: void(0);"
        data-bs-placement="top" 
        title="Editar">
        <i class="fa-solid fa-pen-to-square fa-fw fs-6 icon-color"></i>
      </a>
      <a onclick="eliminarAjax('Está por eliminar un cantón', '¿Está seguro de realizar esta acción?', '{% url 'eliminar_canton' canton.pk %}')"
          data-bs-toggle="tooltip" 
          href="javascript: void(0);"
          data-bs-placement="top" 
          title="Eliminar">
          <i class="fa-solid fa-trash fa-fw fs-6 icon-color"></i>
      </a>
    </div>
  </td>
</tr>
{% endfor %} {% endblock %}
