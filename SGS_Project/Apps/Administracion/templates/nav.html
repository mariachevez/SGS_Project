{% extends 'base.html' %} {% block block_nav %}
<div class="d-flex flex-column gap-2">
  <a
    class="text-decoration-none btn-nav {% if request.resolver_match.url_name == 'listado_persona' %}active{% endif %}"
    href="{% url 'listado_persona' %}"
  >
    <i class="fa-solid fa-user"></i> Personal
  </a>

  <a
    class="text-decoration-none btn-nav d-flex justify-content-between align-items-center {% if request.resolver_match.url_name == 'listado_pais' or request.resolver_match.url_name == 'listado_provincia' or request.resolver_match.url_name == 'listado_canton' %}active{% endif %}"
    data-bs-toggle="collapse"
    href="#collapseUbicaciones"
    role="button"
    aria-expanded="{% if request.resolver_match.url_name == 'listado_pais' or request.resolver_match.url_name == 'listado_provincia' or request.resolver_match.url_name == 'listado_canton' %}true{% else %}false{% endif %}"
    aria-controls="collapseUbicaciones"
  >
    <span><i class="fa-solid fa-earth"></i> Ubicaciones</span>
    <i class="fa-solid fa-chevron-down"></i>
  </a>

  <div
    class="collapse {% if request.resolver_match.url_name == 'listado_pais' or request.resolver_match.url_name == 'listado_provincia' or request.resolver_match.url_name == 'listado_canton' %}show{% endif %}"
    id="collapseUbicaciones"
  >
    <div class="d-flex flex-column gap-1 ps-4 mt-1">
      <a
        class="text-decoration-none btn-nav-child {% if request.resolver_match.url_name == 'listado_pais' %}active{% endif %}"
        href="{% url 'listado_pais' %}"
      >
        Países
      </a>

      <a
        class="text-decoration-none btn-nav-child {% if request.resolver_match.url_name == 'listado_provincia' %}active{% endif %}"
        href="{% url 'listado_provincia' %}"
      >
        Provincia
      </a>

      <a
        class="text-decoration-none btn-nav-child {% if request.resolver_match.url_name == 'listado_canton' %}active{% endif %}"
        href="{% url 'listado_canton' %}"
      >
        Cantón
      </a>
    </div>
  </div>
</div>
{% endblock %}
