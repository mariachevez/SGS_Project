{% extends 'formulario.html' %}
{% block block_form %}
    <style>
        .worker-panel {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 2rem;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffffff, #f8fafc);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
        }
        .worker-avatar-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .worker-avatar {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            object-fit: cover;
            background: #e9ecef;
            border: 5px solid #fff;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.14);
        }
        .worker-check {
            position: absolute;
            right: 2px;
            bottom: 6px;
            width: 24px;
            height: 24px;
            background: #20c997;
            color: #fff;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }
        .worker-name {
            font-size: 1rem;
            font-weight: 700;
            color: #06142f;
            margin-bottom: 0.25rem;
        }
        .worker-role {
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }
        .worker-id {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #e2e8f0;
            border-radius: 7px;
            padding: 0.35rem 0.75rem;
            font-size: 0.75rem;
            color: #334155;
            background: #fff;
        }
    </style>

    <div class="row g-4 align-items-center">
        <div class="col-lg-5 col-md-12">
            <div class="mb-4">
                <span class="text-muted small d-block text-uppercase fw-bold">Asignando Personal a:</span>
                <h4 class="text-primary fw-bold m-0" id="area-label">{{ area.nombre }}</h4>
            </div>

            <div class="mb-4">
                <label for="persona" class="form-label fw-bolder">TRABAJADOR:</label>
                <select class="form-select" name="persona" id="persona">
                    <option value="">Seleccione una opción</option>
                    {% for persona in personas %}
                        <option value="{{ persona.pk }}">
                            {{ persona.nombre_completo_minus }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <p class="text-muted small"><i class="fas fa-info-circle"></i> Al seleccionar al trabajador se cargará su perfil automáticamente.</p>
        </div>

        <div class="col-lg-7 col-md-12">
            <div class="worker-panel mx-4">
                <div class="text-center" id="worker-preview">
                    <div class="text-muted">
                        Seleccione un trabajador para ver su perfil
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-4">
        <button type="button" class="btn btn-outline-dark rounded-3" id="btn-confirmar">
            <i class="fas fa-save"></i> Confirmar Asignación
        </button>
        <button type="button" class="btn btn-danger border-0 fw-medium px-4 py-2 rounded-2 fs-7" data-bs-dismiss="modal">
            Cerrar
        </button>
    </div>
{% endblock %}

{% block buttons %}{% endblock %} {% block extra_js %}
    <script>
        $(function () {
            $(document).on("change", "#persona", function () {
                const personaId = $(this).val();
                let debeRecargar = false;

                if (!personaId) {
                    $("#worker-preview").html(`
                        <div class="text-muted">
                            Seleccione un trabajador para ver su perfil
                        </div>
                    `);
                    return;
                }

                $.ajax({
                    type: "GET",
                    url: "/areas/buscar_personal_area/", // Ruta absoluta segura
                    data: { id: personaId },
                    dataType: "json",
                    success: function (data) {
                        if (data.result) {
                            $("#worker-preview").html(`
                                <div id="worker-card" data-id="${data.id}">
                                  <div class="worker-avatar-wrap">
                                      <img class="worker-avatar" src="${data.foto}" alt="Foto">
                                      <span class="worker-check">
                                          <i class="fas fa-check"></i>
                                      </span>
                                  </div>
                                  <div class="worker-name">${data.nombres}</div>
                                  <div class="worker-role">Trabajador</div>
                                  <div class="worker-id">
                                      <i class="far fa-id-card"></i> ID: ${data.identificacion || "N/A"}
                                  </div>
                                </div>
                            `);
                        } else {
                            ToastDanger(data.mensaje);
                        }
                    },
                    error: function (xhr) {
                        console.error("Error en la petición:", xhr.responseText);
                    }
                });
            });

            // GUARDADO REAL (POST)
            $("#btn-confirmar").on("click", function () {
                const persona = $("#worker-card").data("id");

                if (!persona) {
                    ToastDanger("Por favor, seleccione un trabajador válido de la lista antes de confirmar.");
                    return false;
                }

                $.ajax({
                    type: "POST",
                    url: "{% url 'adicionar_personal' area.id %}",
                    data: {
                        persona_id: persona,
                        csrfmiddlewaretoken: $("input[name=csrfmiddlewaretoken]").val(),
                    },
                    dataType: "json",
                    success: function (data) {
                        if (data.result) {

                            debeRecargar = true;
                            const $select = $("#persona");

                            // Modificamos las opciones directamente del componente nativo
                            $select.empty().append(`<option value="">Seleccione una opción</option>`);
                            data.personas.forEach(function (e) {
                                $select.append(`<option value="${e.id}">${e.nombres}</option>`);
                            });

                            // Forzamos a Select2 a enterarse de que refrescamos sus opciones
                            $select.val("").trigger("change");

                            $("#worker-preview").html(`
                                <div class="text-muted">
                                    Seleccione un trabajador para ver su perfil
                                </div>
                            `);

                            ToastSuccess(data.mensaje || "Se ha guardado con éxito el registro");
                        } else {
                            ToastDanger(data.mensaje);
                        }
                    },
                    error: function (xhr) {
                        ToastDanger("Error crítico al intentar guardar la asignación.");
                    },
                });
            });
            $(document).on('hidden.bs.modal', '.modal', function () {
                if (debeRecargar) {
                    location.reload();
                }
            });
        });
    </script>
{% endblock %}
